version: 1
project:
  title: OpenMDAO
  authors:
    - name: The OpenMDAO Development Team
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - template.ipynb
  github: OpenMDAO/OpenMDAO
  bibliography:
    - references.bib
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: main.ipynb
    - title: Getting Started
      children:
        - file: getting_started/getting_started.ipynb
    - title: Basic User Guide
      children:
        - file: basic_user_guide/basic_user_guide.ipynb
          children:
            - file: >-
                basic_user_guide/single_disciplinary_optimization/component_types.ipynb
            - file: >-
                basic_user_guide/single_disciplinary_optimization/first_analysis.ipynb
            - file: >-
                basic_user_guide/single_disciplinary_optimization/first_optimization.ipynb
            - file: basic_user_guide/multidisciplinary_optimization/sellar.ipynb
            - file: >-
                basic_user_guide/multidisciplinary_optimization/linking_vars.ipynb
            - file: basic_user_guide/multidisciplinary_optimization/sellar_opt.ipynb
            - file: basic_user_guide/command_line/check_setup.ipynb
            - file: basic_user_guide/command_line/make_n2.ipynb
            - file: basic_user_guide/reading_recording/basic_recording_example.ipynb
    - title: Advanced User Guide
      children:
        - file: advanced_user_guide/advanced_user_guide.ipynb
          children:
            - file: >-
                advanced_user_guide/models_implicit_components/models_with_solvers_implicit.ipynb
            - file: >-
                advanced_user_guide/models_implicit_components/implicit_with_balancecomp.ipynb
            - file: >-
                advanced_user_guide/analytic_derivatives/derivs_of_coupled_systems.ipynb
            - file: >-
                advanced_user_guide/analytic_derivatives/partial_derivs_implicit.ipynb
            - file: >-
                advanced_user_guide/analytic_derivatives/partial_derivs_explicit.ipynb
            - file: advanced_user_guide/recording/advanced_case_recording.ipynb
            - file: advanced_user_guide/example/euler_integration_example.ipynb
            - file: advanced_user_guide/complex_step.ipynb
            - file: advanced_user_guide/analysis_errors/analysis_error.ipynb
    - title: Reference Guide
      children:
        - file: theory_manual/theory_manual.ipynb
          children:
            - file: theory_manual/class_structure.ipynb
            - file: theory_manual/implicit_transformation_of_vars.ipynb
            - file: theory_manual/setup_stack.ipynb
            - file: theory_manual/solver_api.ipynb
            - file: theory_manual/scaling.ipynb
            - file: theory_manual/iter_count.ipynb
            - file: theory_manual/total_derivs_theory.ipynb
            - file: theory_manual/setup_linear_solvers.ipynb
            - file: >-
                theory_manual/advanced_linear_solvers_special_cases/advanced_linear_solvers_special_cases.ipynb
            - file: theory_manual/mpi.ipynb
        - file: features/features.ipynb
          children:
            - file: features/core_features/main.ipynb
            - file: features/building_blocks/building_blocks.ipynb
            - file: features/recording/main.ipynb
            - file: features/model_visualization/main.ipynb
            - file: features/debugging/debugging.ipynb
            - file: features/warning_control/warnings.ipynb
            - file: features/units.ipynb
            - file: features/experimental/main.ipynb
        - file: examples/examples.ipynb
          children:
            - file: examples/tldr_paraboloid.ipynb
            - file: examples/paraboloid.ipynb
            - file: examples/betz_limit.ipynb
            - file: examples/hohmann_transfer/hohmann_transfer.ipynb
            - file: examples/keplers_equation.ipynb
            - file: examples/circuit_analysis_examples.ipynb
            - file: examples/beam_optimization_example.ipynb
            - file: examples/beam_optimization_example_part_2.ipynb
            - file: examples/simul_deriv_example.ipynb
    - title: Other Useful Docs
      children:
        - file: other_useful_docs/om_command.ipynb
        - file: other/citing.ipynb
        - file: other_useful_docs/building_a_tool/building_a_tool.ipynb
          children:
            - file: other_useful_docs/building_a_tool/repository_structure.ipynb
            - file: other_useful_docs/building_a_tool/release_process.ipynb
        - file: other_useful_docs/auto_ivc_api_translation.ipynb
        - file: other_useful_docs/api_translation.ipynb
        - file: other_useful_docs/environment_vars.ipynb
        - file: other_useful_docs/file_wrap.ipynb
        - file: _srcdocs/index.ipynb
        - file: other_useful_docs/developer_docs/developer_docs.ipynb
          children:
            - file: other_useful_docs/developer_docs/signing_commits.ipynb
            - file: other_useful_docs/developer_docs/unit_testing.ipynb
            - file: other_useful_docs/developer_docs/ci_testing.ipynb
            - file: other_useful_docs/developer_docs/doc_build.ipynb
            - file: other_useful_docs/developer_docs/doc_style_guide.ipynb
            - file: other_useful_docs/developer_docs/sphinx_decorators.ipynb
            - file: other_useful_docs/developer_docs/writing_plugins.ipynb
site:
  options:
    logo: OpenMDAO_Logo.png
  template: book-theme
